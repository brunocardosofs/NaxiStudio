<!doctype html>
<html lang="br">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NaxiStudio Player</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="main-player">
      <div id="players">
        <div class="player" id="0">
          <div class="controls-player 0">
            <button class="btn-player btn-play 0"></button>
            <button class="btn-player btn-pause 0"></button>
            <button class="btn-player btn-stop 0"></button>
          </div>
          <div class="infos-player">
            <span class="title-player">Título</span>
            <span class="time-bar">bar</span>
            <div class="times-player">
              <span class="total-time">00:00</span>
              <span class="time-left">00:00</span>
            </div>
          </div>
          <audio class="audio-player" id="audiotag0" src="#"></audio>
        </div>
      </div>
      <div id="tools">
        <div class="tools-content">
          <i class="btn-tools open-config"></i>
          <i class="btn-tools save-playlist"></i>
        </div>
        <div class="tools-content">
          <div class="calendar"><i class="open-calendar"></i>00/00/0000</div>
          <div class="clock">00/00/0000 00:00:00</div>
        </div>
      </div>
      <div id="playlist">
        <ul id="hours">
          <li class="hour" id="h00">00</li>
          <li class="hour" id="h01">01</li>
          <li class="hour" id="h02">02</li>
          <li class="hour">03</li>
          <li class="hour">04</li>
          <li class="hour">05</li>
          <li class="hour">06</li>
          <li class="hour">07</li>
          <li class="hour">08</li>
          <li class="hour">09</li>
          <li class="hour">10</li>
          <li>11</li>
          <li>12</li>
          <li>13</li>
          <li>14</li>
          <li>15</li>
          <li>16</li>
          <li>17</li>
          <li>18</li>
          <li>19</li>
          <li>20</li>
          <li>21</li>
          <li>22</li>
          <li>23</li>
        </ul>
        <div id="playlist-area">
          <ul id="list" class="grid"></ul>
          <div id="playlist-tools"></div>
        </div>
      </div>
    </div>
    <div id="right-panel">
      <div id="commercial"></div>
      <div id="tools-right">
        <div id="collection">

        </div>

      </div>
    </div>

    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
